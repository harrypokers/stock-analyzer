<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avanza Stock Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .search-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        .search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .search-result {
            padding: 12px;
            background: #f5f5f5;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-result:hover {
            background: #e0e0e0;
        }

        .analysis-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .price-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .indicator-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .indicator {
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .indicator-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .indicator-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .signals-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .signal {
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid;
            background: #f9f9f9;
        }

        .signal.buy {
            border-left-color: #4caf50;
            background: #f1f8f4;
        }

        .signal.sell {
            border-left-color: #f44336;
            background: #fef1f0;
        }

        .signal.hold {
            border-left-color: #ff9800;
            background: #fff8f3;
        }

        .signal-type {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .signal-description {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
        }

        .signal-confidence {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }

        .signal-strength {
            font-size: 1.5em;
            font-weight: bold;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .signal-strength.bullish {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .signal-strength.bearish {
            background: #ffebee;
            color: #c62828;
        }

        .signal-strength.neutral {
            background: #fff3e0;
            color: #e65100;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .analysis-section {
                grid-template-columns: 1fr;
            }
        }

        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Avanza Stock Analyzer</h1>
            <p>Real-time technical analysis and trading signals</p>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search stocks (e.g., AAPL, MSFT, TESLA)...">
                <button onclick="analyzeStock()">Analyze</button>
            </div>
            <div id="searchResults" class="search-results" style="display: none;"></div>
        </div>

        <div id="analysisContainer" style="display: none;">
            <div class="analysis-section">
                <div class="card">
                    <h2>Price & Indicators</h2>
                    <div class="price-display" id="priceDisplay">-</div>
                    <div class="indicator-grid" id="indicatorGrid"></div>
                </div>

                <div class="card">
                    <h2>Trading Signals</h2>
                    <div class="signal-strength" id="signalStrength"></div>
                    <div class="signals-list" id="signalsList"></div>
                </div>

                <div class="card full-width">
                    <h2>Price Chart (30 Days)</h2>
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div id="loadingContainer" class="loading" style="display: none;">
            <p>Analyzing stock data...</p>
        </div>

        <div id="errorContainer" style="display: none;"></div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let priceChart = null;

        async function analyzeStock() {
            const symbol = document.getElementById('searchInput').value.toUpperCase();
            if (!symbol) return;

            showLoading(true);
            hideError();

            try {
                const response = await fetch(`${API_BASE}/api/analyze/${symbol}`);
                if (!response.ok) throw new Error('Stock not found');

                const data = await response.json();
                displayAnalysis(data);
                document.getElementById('searchResults').style.display = 'none';
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        function displayAnalysis(data) {
            // Price
            document.getElementById('priceDisplay').textContent = `$${data.currentPrice.toFixed(2)}`;

            // Indicators
            const indicators = data.indicators;
            const indicatorGrid = document.getElementById('indicatorGrid');
            indicatorGrid.innerHTML = `
                <div class="indicator">
                    <div class="indicator-label">RSI (14)</div>
                    <div class="indicator-value">${indicators.rsi.toFixed(2)}</div>
                </div>
                <div class="indicator">
                    <div class="indicator-label">MACD</div>
                    <div class="indicator-value">${indicators.macd.toFixed(4)}</div>
                </div>
                <div class="indicator">
                    <div class="indicator-label">SMA 20</div>
                    <div class="indicator-value">$${indicators.sma20.toFixed(2)}</div>
                </div>
                <div class="indicator">
                    <div class="indicator-label">SMA 50</div>
                    <div class="indicator-value">$${indicators.sma50.toFixed(2)}</div>
                </div>
                <div class="indicator">
                    <div class="indicator-label">SMA 200</div>
                    <div class="indicator-value">$${indicators.sma200.toFixed(2)}</div>
                </div>
                <div class="indicator">
                    <div class="indicator-label">ATR</div>
                    <div class="indicator-value">${indicators.atr.toFixed(4)}</div>
                </div>
                <div class="indicator">
                    <div class="indicator-label">Stochastic K</div>
                    <div class="indicator-value">${indicators.stochasticK.toFixed(2)}</div>
                </div>
                <div class="indicator">
                    <div class="indicator-label">Bollinger Upper</div>
                    <div class="indicator-value">$${indicators.bollingerUpper.toFixed(2)}</div>
                </div>
            `;

            // Signal Strength
            const strength = data.signalStrength;
            const strengthDiv = document.getElementById('signalStrength');
            let strengthClass = 'neutral';
            let strengthText = 'NEUTRAL';
            if (strength > 20) {
                strengthClass = 'bullish';
                strengthText = '🟢 BULLISH';
            } else if (strength < -20) {
                strengthClass = 'bearish';
                strengthText = '🔴 BEARISH';
            }
            strengthDiv.className = `signal-strength ${strengthClass}`;
            strengthDiv.textContent = `${strengthText} (${strength.toFixed(2)})`;

            // Signals
            const signalsList = document.getElementById('signalsList');
            signalsList.innerHTML = data.signals.map(signal => `
                <div class="signal ${signal.action.toLowerCase()}">
                    <div class="signal-type">${signal.type}</div>
                    <div class="signal-description">${signal.description}</div>
                    <span class="signal-confidence">Confidence: ${signal.confidence.toFixed(0)}%</span>
                </div>
            `).join('');

            // Chart
            updateChart(data.priceHistory);

            document.getElementById('analysisContainer').style.display = 'block';
        }

        function updateChart(priceHistory) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (priceChart) {
                priceChart.destroy();
            }

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: priceHistory.map(p => p.date),
                    datasets: [
                        {
                            label: 'Close Price',
                            data: priceHistory.map(p => p.close),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4,
                            fill: true,
                            pointRadius: 0,
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        function showLoading(show) {
            document.getElementById('loadingContainer').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorContainer');
            errorDiv.innerHTML = `<div class="error">${message}</div>`;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorContainer').style.display = 'none';
        }

        // Search on enter
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') analyzeStock();
        });
    </script>
</body>
</html>
